name: regiongrow
display_name: Region Grow Vessel Segmentation
schema_version: 0.2.0
contributions:
  commands:
    - id: regiongrow.make_widget
      python_name: regiongrow._widget:RegionGrowWidget
      title: Region Grow Vessel Segmentation
    - id: regiongrow.read_ome_tiff
      python_name: regiongrow._ome_reader:napari_get_reader
      title: Read OME-TIFF with voxel spacing
    - id: regiongrow.read_omezarr_with_segmentation
      python_name: regiongrow._omezarr_reader:napari_get_reader
      title: Read OME-Zarr + segmentation labels
    - id: regiongrow.sample_data
      python_name: regiongrow._sample_data:make_sample_vessel
      title: Synthetic Hollow Vessel
  readers:
    - command: regiongrow.read_ome_tiff
      filename_patterns:
        - '*.ome.tif'
        - '*.ome.tiff'
      accepts_directories: false
    - command: regiongrow.read_omezarr_with_segmentation
      filename_patterns:
        - '*.ome.zarr'
      accepts_directories: true
  widgets:
    - command: regiongrow.make_widget
      display_name: Region Grow Vessel Segmentation
  sample_data:
    - command: regiongrow.sample_data
      display_name: Synthetic Hollow Vessel
      key: synthetic-hollow-vessel
