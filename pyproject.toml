[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "regiongrow"
version = "0.1.0"
description = "A napari plugin for 3D vessel segmentation using region growing"
requires-python = ">=3.9"
license = "BSD-3-Clause"
dependencies = [
    "napari[all]",
    "pandas>=1.3",
    "numpy",
    "scipy",
    "scikit-image",
    "scikit-fmm",
    "tifffile",
    "magicgui",
    "qtpy",
]

[project.optional-dependencies]
zarr-cli = [
    "ome-zarr>=0.8",
    "zarr>=2.14",
    "numcodecs",
    "dask[array]",
]
# OME-TIFF → OME-Zarr via BioIO + OMEZarrWriter (``regiongrow-convert-to-ome-zarr``).
zarr-cli-bioio = [
    "ome-zarr>=0.8",
    "zarr>=2.14",
    "numcodecs",
    "dask[array]",
    "bioio>=3",
    "bioio-ome-tiff>=1.0",
    "bioio-ome-zarr>=3",
]

[project.scripts]
regiongrow-convert-to-ome-zarr = "regiongrow.cli.ome_tiff_to_zarr_bioio:main"
regiongrow-preprocess-zarr = "regiongrow.cli.preprocess_zarr:main"
regiongrow-preprocess-ome-tiff = "regiongrow.cli.preprocess_ome_tiff:main"

[project.entry-points."napari.manifest"]
regiongrow = "regiongrow:napari.yaml"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
regiongrow = ["napari.yaml"]
